<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Refurb QC — Shift</title>
<link rel="manifest" href="/refurb-prototype/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="/refurb-prototype/assets/apple-touch-icon.png">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    overflow:hidden; position:fixed;
    overscroll-behavior:none;
    font-family:'Satoshi', -apple-system, system-ui, sans-serif;
    background:#fff;
  }
  .phone {
    width:390px;
    background:#f2f2f2;
    position:relative; overflow:hidden;
    transform-origin:top left;
  }

  /* ─────────────────────────────────────────────────────────────────
     Hero — fills everything above the bottom card (dynamic height)
  ───────────────────────────────────────────────────────────────── */
  #heroArea {
    position:absolute;
    top:0; left:0; right:0;
    /* bottom set inline by JS */
    background:#c8d4dc;   /* passport-booth neutral */
    overflow:hidden;
    min-height:160px;
  }
  /* ── Carousel slider ── */
  #heroSlider {
    position:absolute; top:0; left:0;
    width:1170px;           /* 3 × 390px */
    height:100%;
    display:flex;
    transition:transform .38s cubic-bezier(0.4,0,0.2,1);
    will-change:transform;
  }
  .hero-slide {
    width:390px; height:100%;
    flex-shrink:0;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Silhouette — centred in slide */
  #heroSilhouette {
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%, -50%);
    width:148px; height:148px;
    color:#7a96a6;
    transition:color .6s ease;
    flex-shrink:0;
  }
  #heroArea.off-duty { background:#a8b4bb; }
  #heroArea.off-duty #heroSilhouette { color:#6a7a82; }

  /* ── QR card (slide 2) ── */
  #qrCard {
    background:#fff;
    border-radius:20px;
    padding:28px 28px 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    box-shadow:0 8px 32px rgba(0,0,0,0.13);
  }
  #qrCard img {
    width:168px; height:168px;
    display:block;
    border-radius:6px;
  }
  #qrLabel {
    font-family:'Satoshi',sans-serif;
    font-weight:500; font-size:13px; line-height:16px;
    color:#aaa; letter-spacing:.4px;
  }

  #heroGradient {
    position:absolute; top:0; left:0; width:100%; height:60px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0) 100%);
    pointer-events:none;
  }
  #heroScrim {
    position:absolute; bottom:0; left:0; width:100%; height:80px;
    background:linear-gradient(to top, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0) 100%);
    pointer-events:none;
  }
  #backBtn {
    position:absolute; left:4px; top:10px;
    width:48px; height:48px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; -webkit-tap-highlight-color:transparent; z-index:2;
  }
  #dutyPill {
    position:absolute; left:24px; top:120px;   /* 52 + 52 + 16 */
    padding:6px 16px; border-radius:100px;
    font-family:'Satoshi',sans-serif; font-weight:500;
    font-size:12px; line-height:16px; color:#fff;
    background:#00654f; white-space:nowrap; z-index:1;
    transition:background .45s ease;
  }
  #dutyPill.off-duty { background:#717171; }
  #dutyPill.paused   { background:#D4690A; }
  #carouselDots {
    position:absolute; bottom:20px; left:0; width:100%;
    display:flex; align-items:center; justify-content:center; gap:8px; z-index:2;
  }
  .dot { width:24px; height:6px; border-radius:10px; transition:background .3s; }
  .dot.active   { background:#fff; }
  .dot.inactive { background:rgba(255,255,255,0.38); }

  /* ─────────────────────────────────────────────────────────────────
     Bottom card — fixed height, always stuck to bottom of phone
  ───────────────────────────────────────────────────────────────── */
  #bottomCard {
    position:absolute;
    bottom:0; left:0; right:0;
    height:488px;  /* nameSection(172) + workSection(196) + sliderSection(120) */
  }

  /* ── Name / ID / chip section ── */
  #nameSection {
    position:relative;
    height:172px;   /* 24 + 20 + 8 + 52 + 16 + 28 + 24 */
    background:#fff;
    border-bottom:.5px solid #ebebeb;
  }
  /* ID — 24px below photo edge */
  #employeeId {
    position:absolute;
    left:24px; top:24px;
    font-family:'Satoshi',sans-serif; font-weight:500;
    font-size:13px; line-height:20px; color:#aaa;
    letter-spacing:.5px;
  }
  /* Name — 8px below ID */
  #employeeName {
    position:absolute;
    left:24px; top:52px;   /* 24 + 20 + 8 */
    font-family:'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-weight:700; font-size:48px; line-height:52px;
    color:#111; text-transform:uppercase;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:342px; letter-spacing:1.5px;
  }

  /* ── Work details section ── */
  #workSection {
    position:relative;
    height:196px;
    background:#fff;
  }
  #workHeading {
    position:absolute;
    left:24px; top:16px;
    font-family:'Satoshi',sans-serif; font-weight:700;
    font-size:20px; line-height:28px; color:#222;
  }

  /* Work rows — relative so they stack naturally in workSection */
  .work-row {
    position:absolute;
    left:0; width:100%; height:72px;
    display:flex; align-items:center;
    padding:0 24px; gap:12px;
    background:#fff;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition:background .12s;
  }
  .work-row:active { background:#f7f7f7; }
  #locationRow { top:52px; }
  #profileRow  { top:124px; }
  #locationRow::after {
    content:''; position:absolute;
    bottom:0; left:24px; right:0; height:.5px; background:#e8e8e8;
  }
  .work-row-icon { width:24px; height:24px; flex-shrink:0; opacity:.35; }
  .work-row-label {
    font-family:'Satoshi',sans-serif; font-weight:500;
    font-size:16px; line-height:20px; color:#999; flex:1;
  }
  .work-row-value {
    font-family:'Satoshi',sans-serif; font-weight:500;
    font-size:16px; line-height:20px; color:#222; white-space:nowrap;
  }
  .work-row-chevron {
    width:20px; height:20px; flex-shrink:0; opacity:.35;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── Slider section ── */
  #sliderSection {
    position:relative;
    height:120px;
    background:#fff;
    border-top:.5px solid #ebebeb;
  }

  /* Track — centred vertically in sliderSection */
  #sliderTrack {
    position:absolute;
    left:24px; top:50%; transform:translateY(-50%);
    width:278px; height:64px;          /* on-duty default (narrow) */
    border-radius:100px; overflow:hidden;
    background:#004838;
    transition:background .45s ease, width .38s cubic-bezier(0.4,0,0.2,1);
  }

  /* Fill — always full track width via 100%, scaleX controls reveal */
  #sliderFill {
    position:absolute; left:0; top:0; bottom:0;
    width:100%;
    transform-origin:left center;
    transform:scaleX(0);          /* hidden at rest */
    border-radius:100px;
    pointer-events:none;
    background:linear-gradient(90deg, #009966 0%, #D4690A 100%); /* on-duty */
    transition:background .45s ease;
  }

  /* Pause / play button — right of slider track */
  #pauseBtn {
    position:absolute;
    right:24px; top:50%;
    transform:translateY(-50%);
    width:56px; height:56px;
    border-radius:50%;
    background:#f2f2f2;
    border:none; outline:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    box-shadow:0 1px 4px rgba(0,0,0,0.10);
    transition:background .18s ease, opacity .3s ease;
    z-index:4;
  }
  #pauseBtn:active { background:#e8e8e8; }
  #pauseBtn.paused { background:#FFF3E8; }
  #pauseBtn.hidden { opacity:0; pointer-events:none; }

  /* Toast */
  #toast {
    position:absolute;
    bottom:132px; left:50%;
    transform:translateX(-50%) translateY(8px);
    background:rgba(28,28,28,0.90);
    color:#fff;
    font-family:'Satoshi',sans-serif; font-weight:500;
    font-size:14px; line-height:18px;
    padding:10px 22px;
    border-radius:100px;
    white-space:nowrap;
    pointer-events:none;
    opacity:0;
    transition:opacity .22s ease, transform .22s ease;
    z-index:20;
  }
  #toast.show {
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  #sliderLabel {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    font-family:'Satoshi',sans-serif; font-weight:700;
    font-size:15px; line-height:20px;
    color:rgba(255,255,255,0.72);
    white-space:nowrap; pointer-events:none; user-select:none;
    z-index:2; transition:opacity .15s;
  }
  #sliderThumb {
    position:absolute; left:8px; top:8px;
    width:48px; height:48px;
    background:#fff; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:grab; cursor:-webkit-grab;
    touch-action:none; will-change:left,transform;
    z-index:3;
    box-shadow:0 2px 12px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.12);
    transition:transform .15s ease, background .25s ease;
  }
  #sliderThumb.dragging {
    transform:scale(1.07);
    cursor:grabbing; cursor:-webkit-grabbing;
  }
  #sliderThumb.confirmed-end   { background:#D4690A; }
  #sliderThumb.confirmed-start { background:#00654f; }
  #sliderThumb.confirmed-end   .icon-arrow,
  #sliderThumb.confirmed-start .icon-arrow { display:none  !important; }
  #sliderThumb.confirmed-end   .icon-check,
  #sliderThumb.confirmed-start .icon-check { display:flex  !important; }
</style>
</head>
<body>
<div class="phone" id="phone">

  <!-- ── Hero (fills top, height = phone height − 424px) ── -->
  <div id="heroArea">
    <!-- Carousel: 3 slides -->
    <div id="heroSlider">

      <!-- Slide 1 — Silhouette -->
      <div class="hero-slide">
        <svg id="heroSilhouette"
          viewBox="0 0 148 148" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <!-- Soft backing circle -->
          <circle cx="74" cy="74" r="74" fill="currentColor" opacity="0.18"/>
          <!-- Head -->
          <circle cx="74" cy="56" r="22" fill="currentColor"/>
          <!-- Shoulders -->
          <path d="M18 130 C18 100 42 88 74 88 C106 88 130 100 130 130 Z"
                fill="currentColor"/>
        </svg>
      </div>

      <!-- Slide 2 — QR code -->
      <div class="hero-slide">
        <div id="qrCard">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=YL0176&color=1C1C1E&bgcolor=FFFFFF&margin=8"
            alt="Employee QR code" />
          <span id="qrLabel">Scan to verify · YL0176</span>
        </div>
      </div>

      <!-- Slide 3 — placeholder -->
      <div class="hero-slide"></div>

    </div><!-- /heroSlider -->

    <div id="heroGradient"></div>

    <div id="backBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M20 12H4M4 12l7-7M4 12l7 7"
          stroke="#444" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="carouselDots">
      <div class="dot active"></div>
      <div class="dot inactive"></div>
      <div class="dot inactive"></div>
    </div>
  </div>

  <!-- ── Bottom card (always stuck to bottom) ── -->
  <div id="bottomCard">

    <!-- ID · Name · Duty chip -->
    <div id="nameSection">
      <div id="employeeId">YL0176</div>
      <div id="employeeName">Rahul Mehta</div>
      <div id="dutyPill">On Duty</div>
    </div>

    <!-- Work details -->
    <div id="workSection">
      <div id="workHeading">Work details</div>

      <div class="work-row" id="locationRow">
        <svg class="work-row-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.686 2 6 4.686 6 8c0 4.75 6 12 6 12s6-7.25 6-12c0-3.314-2.686-6-6-6z"
            stroke="#222" stroke-width="1.7"/>
          <circle cx="12" cy="8" r="2.5" stroke="#222" stroke-width="1.7"/>
        </svg>
        <span class="work-row-label">Location</span>
        <span class="work-row-value">CML Workshop</span>
        <div class="work-row-chevron">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M9 6l6 6-6 6" stroke="#222" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="work-row" id="profileRow">
        <svg class="work-row-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="#222" stroke-width="1.7"/>
          <path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7"
            stroke="#222" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <span class="work-row-label">Profile</span>
        <span class="work-row-value">Quality Technician</span>
        <div class="work-row-chevron">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M9 6l6 6-6 6" stroke="#222" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Slider -->
    <div id="sliderSection">
      <div id="sliderTrack">
        <div id="sliderFill"></div>
        <div id="sliderThumb">
          <span class="icon-arrow" style="display:flex;align-items:center;justify-content:center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M13 6l6 6-6 6"
                stroke="#222" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="icon-check" style="display:none;align-items:center;justify-content:center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M5 12l5 5L19 7"
                stroke="#fff" stroke-width="2.4"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <span id="sliderLabel">End day</span>
      </div>

      <!-- Pause / play button -->
      <button id="pauseBtn" aria-label="Pause">
        <!-- Pause icon -->
        <svg id="pauseIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="5.5" y="4" width="4.5" height="16" rx="1.5" fill="#333"/>
          <rect x="14" y="4" width="4.5" height="16" rx="1.5" fill="#333"/>
        </svg>
        <!-- Play icon — hidden initially -->
        <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:none">
          <path d="M7 4.5l13 7.5-13 7.5V4.5z" fill="#D4690A"/>
        </svg>
      </button>
    </div>

  </div><!-- /bottomCard -->

  <div id="toast"></div>

</div><!-- /phone -->

<script>
  // ── State ─────────────────────────────────────────────────────────
  let onDuty = true;
  let paused  = false;

  const heroArea  = document.getElementById('heroArea');
  const dutyPill  = document.getElementById('dutyPill');
  const track     = document.getElementById('sliderTrack');
  const fill      = document.getElementById('sliderFill');
  const label     = document.getElementById('sliderLabel');
  const thumb     = document.getElementById('sliderThumb');
  const pauseBtn  = document.getElementById('pauseBtn');
  const pauseIcon = document.getElementById('pauseIcon');
  const playIcon  = document.getElementById('playIcon');
  const toastEl   = document.getElementById('toast');

  const SLIDER = {
    on:  { track:'#004838', fill:'linear-gradient(90deg,#009966 0%,#D4690A 100%)', confirm:'confirmed-end'   },
    off: { track:'#1a1a1a', fill:'linear-gradient(90deg,#2d2d2d 0%,#00B87D 100%)', confirm:'confirmed-start' },
  };

  // ── Toast ──────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => {
      toastEl.classList.remove('show');
      toastTimer = null;
    }, 2400);
  }

  // ── Duty state ────────────────────────────────────────────────────
  function setSliderColors(duty) {
    const s = duty ? SLIDER.on : SLIDER.off;
    track.style.background = s.track;
    fill.style.background  = s.fill;
  }

  function syncPauseBtn() {
    // Pause button only visible when on duty
    pauseBtn.classList.toggle('hidden', !onDuty);
    pauseBtn.classList.toggle('paused', paused);
    pauseIcon.style.display = paused ? 'none'  : '';
    playIcon.style.display  = paused ? ''      : 'none';
  }

  function applyDutyState(duty) {
    onDuty = duty;
    paused = false;  // reset pause on state change
    dutyPill.textContent = duty ? 'On Duty' : 'Off Duty';
    dutyPill.classList.toggle('off-duty', !duty);
    dutyPill.classList.remove('paused');
    label.textContent = duty ? 'End day' : 'Start day';
    heroArea.classList.toggle('off-duty', !duty);
    setSliderColors(duty);
    // On-duty → narrow track (pause btn visible); Off-duty → full-width track
    if (duty) {
      track.style.width = '278px';
      THUMB_R = 278 - 48 - 8;  // 222
    } else {
      track.style.width = '318px';
      THUMB_R = 318 - 48 - 8;  // 262
    }
    syncPauseBtn();
  }

  // ── Pause / play ──────────────────────────────────────────────────
  pauseBtn.addEventListener('click', () => {
    if (!onDuty) return;
    paused = !paused;
    dutyPill.textContent = paused ? 'Paused' : 'On Duty';
    dutyPill.classList.toggle('paused', paused);
    dutyPill.classList.toggle('off-duty', false);
    syncPauseBtn();
  });

  // ── Slider mechanics ──────────────────────────────────────────────
  const THUMB_L = 8;
  let   THUMB_R = 278 - 48 - 8;   // 222px on-duty; 262px off-duty — updated in applyDutyState
  // CONFIRM_AT is computed live from the current THUMB_R

  let dragging   = false;
  let dragStartX = 0;
  let thumbBase  = THUMB_L;
  let thumbCur   = THUMB_L;
  let locked     = false;

  function getScale() {
    const m = document.getElementById('phone').style.transform.match(/scale\(([^)]+)\)/);
    return m ? parseFloat(m[1]) : 1;
  }

  function moveThumb(left, animated) {
    const ease = 'left .25s cubic-bezier(0.4,0,0.2,1)';
    const easeFill = 'transform .25s cubic-bezier(0.4,0,0.2,1)';
    thumb.style.transition = animated ? ease     : 'none';
    fill.style.transition  = animated ? easeFill : 'none';

    thumb.style.left = left + 'px';

    // scaleX: 0 at rest (THUMB_L), 1 at fully right (THUMB_R).
    // Hidden when at rest — only reveals as user drags.
    const sc = left <= THUMB_L
      ? 0
      : Math.min(1, (left - THUMB_L) / (THUMB_R - THUMB_L));
    fill.style.transform = `scaleX(${sc})`;

    thumbCur = left;
    const progress = (left - THUMB_L) / (THUMB_R - THUMB_L);
    label.style.opacity = Math.max(0, 1 - progress * 1.6);
  }

  function resetThumb(animated) {
    moveThumb(THUMB_L, animated);
    setTimeout(() => { label.style.opacity = '1'; }, animated ? 200 : 0);
  }

  function onStart(clientX) {
    if (locked) return;
    dragging   = true;
    dragStartX = clientX;
    thumbBase  = thumbCur;
    thumb.classList.add('dragging');
  }

  function onMove(clientX) {
    if (!dragging) return;
    const dx      = (clientX - dragStartX) / getScale();
    const newLeft = Math.max(THUMB_L, Math.min(THUMB_R, thumbBase + dx));
    moveThumb(newLeft, false);
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    thumb.classList.remove('dragging');

    if (thumbCur >= THUMB_R * 0.82) {
      locked = true;
      const wasOnDuty    = onDuty;
      const confirmClass = onDuty ? SLIDER.on.confirm : SLIDER.off.confirm;

      moveThumb(THUMB_R, true);
      setTimeout(() => {
        thumb.classList.add(confirmClass);
        setTimeout(() => {
          applyDutyState(!wasOnDuty);
          showToast(wasOnDuty ? '🌙  Day ended' : '☀️  Day started');
          thumb.classList.remove(confirmClass);
          resetThumb(true);
          locked = false;
        }, 620);
      }, 260);
    } else {
      resetThumb(true);
    }
  }

  // Touch
  thumb.addEventListener('touchstart',  e => onStart(e.touches[0].clientX), { passive:true });
  window.addEventListener('touchmove',  e => { if (dragging) onMove(e.touches[0].clientX); }, { passive:true });
  window.addEventListener('touchend',   () => onEnd(), { passive:true });
  window.addEventListener('touchcancel',() => onEnd(), { passive:true });

  // Mouse
  thumb.addEventListener('mousedown',  e => { onStart(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX); });
  window.addEventListener('mouseup',   () => onEnd());

  // ── Back button ───────────────────────────────────────────────────
  document.getElementById('backBtn').addEventListener('click', () => {
    window.history.length > 1 ? window.history.back() : (window.location.href = 'index.html');
  });

  // ── Work rows ─────────────────────────────────────────────────────
  document.getElementById('locationRow').addEventListener('click', () => {});
  document.getElementById('profileRow').addEventListener('click',  () => {});

  // ── Hero carousel ─────────────────────────────────────────────────
  const heroSlider = document.getElementById('heroSlider');
  const dots       = document.querySelectorAll('.dot');
  let   curSlide   = 0;
  const N_SLIDES   = 3;

  function goToSlide(idx) {
    curSlide = Math.max(0, Math.min(N_SLIDES - 1, idx));
    heroSlider.style.transform = `translateX(${-curSlide * 390}px)`;
    dots.forEach((d, i) => {
      d.classList.toggle('active',   i === curSlide);
      d.classList.toggle('inactive', i !== curSlide);
    });
  }

  // Swipe detection — compare start vs end only (no touchmove needed)
  const heroAreaEl = document.getElementById('heroArea');
  let heroSwipeX = 0, heroSwipeY = 0;
  const SWIPE_THR = 36;   // CSS px

  heroAreaEl.addEventListener('touchstart', e => {
    heroSwipeX = e.touches[0].clientX;
    heroSwipeY = e.touches[0].clientY;
  }, { passive:true });

  heroAreaEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - heroSwipeX;
    const dy = e.changedTouches[0].clientY - heroSwipeY;
    // Only fire if swipe is more horizontal than vertical
    if (Math.abs(dx) < SWIPE_THR || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0) goToSlide(curSlide + 1);
    else        goToSlide(curSlide - 1);
  }, { passive:true });

  // Mouse support for desktop preview
  let heroMouseX = 0, heroMouseDown = false;
  heroAreaEl.addEventListener('mousedown', e => {
    heroMouseX    = e.clientX;
    heroMouseDown = true;
  });
  window.addEventListener('mouseup', e => {
    if (!heroMouseDown) return;
    heroMouseDown = false;
    const dx = e.clientX - heroMouseX;
    if (Math.abs(dx) < SWIPE_THR) return;
    if (dx < 0) goToSlide(curSlide + 1);
    else        goToSlide(curSlide - 1);
  });

  // ── Scale & responsive layout ─────────────────────────────────────
  // Bottom card is always 488px tall; hero fills everything above it.
  const CARD_H = 488;

  function layout() {
    const phone  = document.getElementById('phone');
    const heroEl = document.getElementById('heroArea');
    const vv     = window.visualViewport;
    const vw     = vv ? vv.width  : window.innerWidth;
    const vh     = vv ? vv.height : window.innerHeight;
    const s      = vw / 390;
    const phoneH = Math.round(vh / s);  // phone height in layout px

    phone.style.transform = `scale(${s})`;
    phone.style.height    = phoneH + 'px';

    // Hero fills everything above the card
    heroEl.style.bottom = CARD_H + 'px';
  }

  (function init() {
    syncPauseBtn();   // set initial pause button visibility
    const phone = document.getElementById('phone');
    phone.style.opacity = '0';
    layout();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      phone.style.transition = 'opacity 0.18s ease';
      phone.style.opacity    = '1';
      setTimeout(() => { phone.style.transition = ''; }, 220);
    }));
  })();

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', layout);
  } else {
    window.addEventListener('resize', layout);
  }
</script>
</body>
</html>
